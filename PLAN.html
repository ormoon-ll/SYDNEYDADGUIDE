<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYDNEYDADGUIDE</title>
    <style>
        /* Body with background image and low opacity overlay */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            color: #fff;
            position: relative;
            min-height: 100vh;
            background: url('images/background.png') no-repeat center center fixed;
            background-size: cover;
        }

        /* Overlay to make background transparent/dimmed */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.4); /* 0.4 = 40% dark overlay */
            z-index: 0;
        }

        /* Content container on top of overlay */
        .content {
            position: relative;
            z-index: 1;
            padding: 50px 20px;
        }

        /* Fancy gradient title */
        h1 {
            font-size: 3em;
            background: linear-gradient(90deg, #FF5733, #FFC300, #33FFBD, #3375FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.3em;
            margin-bottom: 40px;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* Fancy city links */
        a {
            display: inline-block;
            margin: 15px;
            padding: 10px 25px;
            font-size: 1.2em;
            color: #ffffff;
            text-decoration: none;
            border: 2px solid #ffffff;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        a:hover {
            background-color: rgba(255,255,255,0.2);
            color: #ffcc00;
            border-color: #ffcc00;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>SYDNEYDADGUIDE</h1>
        <p>Welcome! 
        </p>

    </div>

</body>
</html>
