<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYDNEYDADGUIDE</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
            font-family: Arial, sans-serif;
        }

        body {
            text-align: center;
            color: #fff;
            position: relative;
            min-height: 100vh;

            /* 🔥 MOBILE SAFE BACKGROUND */
            background: url('./images/background.png') no-repeat center center;
            background-size: cover;
            background-attachment: scroll; /* important for mobile */
        }

        /* Overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
            z-index: 0;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            padding: 40px 15px;
        }

        /* Title */
        h1 {
            font-size: 2.2em; /* smaller for mobile */
            background: linear-gradient(90deg, #FF5733, #FFC300, #33FFBD, #3375FF);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        /* Text */
        p {
            font-size: 1.1em;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        /* Button */
        .fancy-button {
            display: inline-block;
            padding: 12px 25px;
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #FF5733, #FFC300, #33FFBD, #3375FF);
            background-size: 300% 300%;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .fancy-button:hover {
            background-position: right center;
            transform: scale(1.05);
        }

        /* 🔥 EXTRA SMALL DEVICES */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.8em;
            }

            p {
                font-size: 1em;
            }

            .fancy-button {
                width: 80%;
                padding: 14px;
                font-size: 1.1em;
            }
        }

        /* 🔥 TABLETS */
        @media (min-width: 768px) {
            h1 {
                font-size: 2.8em;
            }

            p {
                font-size: 1.2em;
            }
        }

    </style>
</head>

<body>

    <div class="content">
        <h1>SYDNEYDADGUIDE</h1>
        <p>Welcome!</p>

        <a href="plan.html" class="fancy-button">Find a Place</a>
    </div>

</body>
</html>
