<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Your Visit</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: url('./images/background.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
        }

        /* Overlay */
        body::before {
            content: '';
            position: fixed; /* FIXED instead of absolute */
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 30px 15px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); /* smaller for mobile */
            gap: 15px;
            max-width: 1000px;
            margin: auto;
        }

        .place-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px 10px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 1.1em;
            text-align: center;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .place-card:hover {
            transform: scale(1.05);
            background: linear-gradient(45deg, #FF5733, #FFC300, #33FFBD, #3375FF);
        }

        /* Mobile tweaks */
        @media (max-width: 480px) {
            .container {
                padding: 20px 10px;
                gap: 10px;
            }

            .place-card {
                font-size: 1em;
                padding: 15px 8px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="https://www.alburycity.nsw.gov.au/whats-on" class="place-card">Albury City</a>
        <a href="https://www.armidale.nsw.gov.au/Our-region/Events" class="place-card">Armidale</a>
    </div>
</body>
</html>
