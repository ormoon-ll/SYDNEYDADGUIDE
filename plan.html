<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Your Visit</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: url('./images/background.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            text-align: center;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 50px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .place-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 1.3em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .place-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            background: linear-gradient(45deg, #FF5733, #FFC300, #33FFBD, #3375FF);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://www.alburycity.nsw.gov.au/whats-on" class="place-card">Alburycity</a>
        <a href="https://www.armidale.nsw.gov.au/Our-region/Events" class="place-card">Armidale</a>
        
    </div>
</body>
</html>
